name: gitown agent

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agent-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git user
        run: |
          git config user.name "gitown-bot"
          git config user.email "gitown-bot@users.noreply.github.com"

      - name: Let the agent touch the town
        run: |
          echo "- $(date -u +"%Y-%m-%dT%H:%M:%SZ") – gitown agent update" >> agent-log.md

      - name: Commit and push changes
        run: |
          git add agent-log.md
          git commit -m "chore: gitown agent update" || exit 0
          git push

